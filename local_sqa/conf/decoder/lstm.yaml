# @package _global_
proj_in_size: 64
trainer:
  model:
    bias: false
    decoder:
      factory: torch.nn.LSTM
      input_size: ${d_model}
      hidden_size: ${eval:"128 if ${trainer.model.decoder.bidirectional} else 256"}
      # bias: false
      num_layers: 1
      bidirectional: true
      proj_size: ${eval:"${proj_in_size}//2 if ${trainer.model.decoder.bidirectional} else ${proj_in_size}"}
